<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D97757"/>
      <stop offset="100%" stop-color="#C4603C"/>
    </linearGradient>
    <linearGradient id="barFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0e6df"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background (Claude orange) -->
  <rect x="16" y="16" width="480" height="480" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Battery/gauge body -->
  <rect x="120" y="100" width="272" height="340" rx="40" ry="40" fill="none" stroke="#ffffff" stroke-width="16" stroke-opacity="0.95"/>

  <!-- Battery top terminal -->
  <rect x="200" y="68" width="112" height="40" rx="16" ry="16" fill="#ffffff" fill-opacity="0.95"/>

  <!-- Usage fill (filled ~60% from bottom) -->
  <rect x="140" y="244" width="232" height="176" rx="28" ry="28" fill="url(#barFill)" fill-opacity="0.9"/>

  <!-- "CC" text in the battery -->
  <text x="256" y="310" text-anchor="middle" fill="#D97757" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="96" font-weight="800" letter-spacing="-2">CC</text>
</svg>
